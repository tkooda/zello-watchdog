name: Build Z-Watchdog APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        # If gradlew is missing from your repo, this command installs 
        # a local version of Gradle to perform the compilation.
        run: |
          if [ ! -f "gradlew" ]; then
            gradle help
            gradle assembleDebug
          else
            chmod +x gradlew
            ./gradlew assembleDebug
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Z-Watchdog-Release
          path: app/build/outputs/apk/debug/z-watchdog.apk

