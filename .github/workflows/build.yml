name: Build Z-Watchdog Release APK
on: [push]

env:
  # Satisfies the environment requirement for Node 24 runners
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # Upgraded to v6 for Node 24 support
        uses: actions/checkout@v6

      - name: Set up JDK 17
        # Upgraded to v5 for Node 24 support
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      - name: Build Release APK
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            gradle assembleRelease
          fi
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        # Upgraded to v6 for Node 24 support
        uses: actions/upload-artifact@v6
        with:
          name: Z-Watchdog-v1.4-Release
          path: app/build/outputs/apk/release/*.apk
